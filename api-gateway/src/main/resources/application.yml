server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
      routes:
        - id: user-service
          uri: http://${USER_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@ipKeyResolver}"

        - id: product-service
          uri: http://${PRODUCT_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                key-resolver: "#{@ipKeyResolver}"

        - id: order-service
          uri: http://${ORDER_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                key-resolver: "#{@userKeyResolver}"

        - id: payment-service
          uri: http://${PAYMENT_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/v1/payments/**

        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8085
          predicates:
            - Path=/api/v1/notifications/**

jwt:
  secret: ${JWT_SECRET:bXlzdXBlcnNlY3JldGtleWZvcmphdmFtYXJrZXRodWIyMDI0}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    export:
      prometheus:
        enabled: true